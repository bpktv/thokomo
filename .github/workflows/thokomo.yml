name: Update thokomo Playlist

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Public Repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Checkout Private Repo Script
      uses: actions/checkout@v4
      with:
        repository: bpktv/scripting
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private-code

    - name: Install dependencies
      run: pip install requests

    - name: Run script
      run: python private-code/ghop.py

    # =======================
    # SAFE COMMIT PUBLIC REPO
    # =======================
    - name: Commit Public Repo Changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add playlist.m3u

        if git diff --cached --quiet; then
          echo "No changes to commit (public repo)"
        else
          git commit -m "Automated Playlist Update"
          git push
        fi

    # =======================
    # SAFE COMMIT PRIVATE REPO
    # =======================
    - name: Commit Private Repo Changes
      run: |
        cd private-code
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add token.json

        if git diff --cached --quiet; then
          echo "No changes to commit (private repo)"
        else
          git commit -m "Private Token Log Updated"
          git push
        fi
