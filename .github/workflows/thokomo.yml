name: Update thokomo Playlist

on:
  workflow_dispatch:

jobs:
  build-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Public Repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Checkout Private Repo Script
      uses: actions/checkout@v4
      with:
        repository: bpktv/scripting
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private-code

    - name: Install dependencies
      run: pip install requests

    - name: Run script
      run: python private-code/ghop.py

    - name: Commit Public Repo Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add playlist.m3u
        git commit -m "Automated Playlist Update" || echo "No changes"
        git push

    - name: Commit Private Repo Changes
      run: |
        cd private-code
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add token.json
        git commit -m "Private Token Log Updated" || echo "No changes"
        git push
